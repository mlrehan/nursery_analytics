services:
  db:
    image: postgres:16-alpine
    container_name: nursery_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nursery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nursery_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-nursery_analytics}
    ports:
      # host:container — host 5498 avoids clashing with a local Postgres on 5432.
      # Connect from pgAdmin on your machine at  localhost:5498
      - "${POSTGRES_HOST_PORT:-5498}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nursery} -d ${POSTGRES_DB:-nursery_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nursery_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network the backend always reaches Postgres at db:5432
      # (the 5498 mapping above is only for tools on your host machine).
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      # the command below already runs migrate+seed once; don't repeat on reload
      RUN_MIGRATIONS_ON_STARTUP: "false"
      SEED_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.cli migrate &&
             python -m app.cli seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nursery_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
