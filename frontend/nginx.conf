# Production web server for the React build.
# Serves static assets and reverse-proxies /api -> backend (same origin, no CORS).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> FastAPI backend (service name "backend" on the compose network)
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # Public social-share pages (OG/Twitter cards + preview image) -> backend.
    # Lets shared links render a rich, branded preview on Facebook/X/WhatsApp/LinkedIn.
    location /share/ {
        proxy_pass         http://backend:8000/share/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every unknown path returns index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
